<head>

  <style>
    :root{--p:#0b63ce;--pd:#084b9b;--ok:#168247;--warn:#b85c00;--bad:#bd2525;--text:#173149;--muted:#667b8d;--line:#d7e3ed;--surface:#fff;--soft:#f5f9fc;--shadow:0 16px 44px rgba(30,69,105,.14)}
    *{box-sizing:border-box}html{-webkit-text-size-adjust:100%}body{margin:0;min-height:100vh;color:var(--text);font-family:Inter,system-ui,-apple-system,"Segoe UI",Arial,sans-serif;background:linear-gradient(180deg,#f7fbff,#edf4f9)}button,input{font:inherit}button{cursor:pointer}.page{width:min(1040px,calc(100% - 20px));margin:18px auto 32px}.card{overflow:hidden;border:1px solid #cedde9;border-radius:18px;background:#fff;box-shadow:var(--shadow)}.head{padding:18px 20px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#fff,#f8fbfd)}h1{margin:0 0 5px;font-size:clamp(22px,3vw,32px)}.sub{margin:0;color:var(--muted);font-size:14px}.player-shell{position:relative;width:100%;aspect-ratio:16/9;min-height:220px;background:#0a1722;overflow:hidden;touch-action:manipulation}#player,#player iframe{width:100%;height:100%}.loading{position:absolute;inset:0;display:grid;place-items:center;color:#e7f1f8;text-align:center;pointer-events:none}.status{padding:16px 20px 20px}.row{display:flex;justify-content:flex-end;align-items:center;gap:10px;flex-wrap:wrap}.time{color:var(--muted);font-variant-numeric:tabular-nums;font-size:13px;font-weight:800}.track{height:11px;margin-top:12px;border-radius:999px;background:#e5edf4;overflow:hidden}.fill{height:100%;width:0;background:linear-gradient(90deg,#1473dc,#17a769);transition:width .2s linear}.message{margin:10px 0 0;color:var(--muted);font-size:13.5px;line-height:1.5}.notice{display:none;margin-top:12px;padding:12px 13px;border-radius:11px;font-size:14px;font-weight:760}.notice.show{display:block}.notice.warning{color:#774100;border:1px solid #eed09b;background:#fff5df}.notice.success{color:#12683a;border:1px solid #bde3cd;background:#eaf8f0}.notice.error{color:#982020;border:1px solid #efc7c7;background:#fff0f0}
    .modal-backdrop{position:fixed;z-index:9998;inset:0;display:none;align-items:center;justify-content:center;padding:14px;background:rgba(7,20,33,.72);backdrop-filter:blur(3px)}.modal-backdrop.show{display:flex}.modal{width:min(720px,100%);max-height:min(88vh,820px);overflow:auto;border-radius:18px;background:#fff;box-shadow:0 24px 80px rgba(0,0,0,.35)}.modal-head{padding:16px 18px;border-bottom:1px solid var(--line);background:#f8fbfd}.modal-head h2{margin:0;font-size:20px}.modal-body{padding:18px}.q{margin:0 0 16px;font-size:19px;line-height:1.45}.options{display:grid;gap:9px}.option{display:flex;align-items:flex-start;gap:9px;padding:12px;border:1px solid #d3e0ea;border-radius:12px;background:#fff;cursor:pointer}.option:hover{background:#f6faff}.option input{margin-top:3px;flex:0 0 auto}.text-answer{width:100%;min-height:48px;padding:11px 13px;border:1px solid #c8d8e5;border-radius:11px;outline:none}.text-answer:focus{border-color:var(--p);box-shadow:0 0 0 4px rgba(11,99,206,.12)}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{padding:9px 12px;border:1px solid #c9d8e5;border-radius:999px;background:#f5f9fc;font-weight:750}.chip.used{opacity:.35;pointer-events:none}.answer-line{min-height:48px;margin-bottom:12px;padding:10px;border:1px dashed #b8cad9;border-radius:11px;background:#fbfdff}.answer-chip{display:inline-flex;align-items:center;gap:7px;margin:3px;padding:7px 10px;border-radius:999px;background:#e8f2ff}.feedback{display:none;margin-top:14px;padding:12px;border-radius:11px;line-height:1.5}.feedback.show{display:block}.feedback.bad{color:#982020;background:#fff0f0;border:1px solid #efc7c7}.feedback.ok{color:#12683a;background:#eaf8f0;border:1px solid #bde3cd}.explain{margin-top:8px;font-weight:500}.modal-actions{display:flex;justify-content:flex-end;gap:9px;flex-wrap:wrap;margin-top:16px}.btn{min-height:43px;padding:10px 15px;border:0;border-radius:10px;font-weight:850}.primary{color:#fff;background:linear-gradient(135deg,var(--p),var(--pd))}.secondary{color:var(--text);border:1px solid #d1deea;background:#eaf1f7}.hidden{display:none!important}.toast{position:fixed;z-index:10000;right:16px;bottom:16px;width:min(390px,calc(100% - 32px));padding:13px 15px;border-radius:12px;color:#fff;background:#1a3246;box-shadow:0 16px 42px rgba(0,0,0,.24);opacity:0;transform:translateY(12px);pointer-events:none;transition:.2s}.toast.show{opacity:1;transform:none}
    .image-options{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.image-option{display:block;padding:9px;border:1px solid #d3e0ea;border-radius:12px;background:#fff;cursor:pointer}.image-option input{margin-right:6px}.image-option img{display:block;width:100%;aspect-ratio:4/3;object-fit:contain;margin-bottom:7px;border-radius:9px;background:#f3f6f8}.inline-question{font-size:17px;line-height:2.25}.blank-input{width:min(170px,42vw);min-height:39px;margin:0 5px;padding:6px 9px;border:1px solid #bdd0de;border-radius:8px}.matching-grid,.classification-grid{display:grid;gap:9px}.match-row,.class-row{display:grid;grid-template-columns:minmax(110px,1fr) minmax(150px,1.2fr);gap:9px;align-items:center;padding:10px;border:1px solid #d7e2eb;border-radius:10px;background:#fbfdff}.match-row select,.class-row select{width:100%;min-height:40px;padding:7px;border:1px solid #c7d7e4;border-radius:8px;background:#fff}.match-image{display:grid;grid-template-columns:130px 1fr;gap:10px;align-items:center;padding:9px;border:1px solid #d7e2eb;border-radius:11px}.match-image img{width:130px;height:95px;object-fit:contain;border-radius:8px;background:#f2f5f7}.content-card{padding:16px;border:1px solid #d3e1ec;border-radius:14px;background:linear-gradient(180deg,#fbfdff,#f4f9fd);line-height:1.65}.content-card h3{margin:0 0 8px;color:#0b63ce}.content-card img{display:block;max-width:100%;max-height:310px;margin:12px auto;border-radius:12px}.vocab-word{font-size:28px;font-weight:900;color:#0b63ce}.vocab-ipa{margin-left:8px;color:#6a7987;font-size:17px}.vocab-meaning{margin-top:8px;font-size:18px;font-weight:750}.content-example{margin-top:10px;padding:10px 12px;border-left:4px solid #f0a020;background:#fff8e9}.speech-box,.record-box{padding:14px;border:1px solid #d5e2ec;border-radius:12px;background:#f8fbfd}.speech-target{margin-bottom:12px;font-size:20px;font-weight:850}.speech-result{margin-top:10px;padding:9px;border-radius:9px;background:#fff;border:1px solid #d4e1ea}.record-actions{display:flex;gap:8px;flex-wrap:wrap}.record-state{margin-top:9px;color:#63798c}.long-answer{min-height:95px;resize:vertical}.audio-player{width:100%;margin-top:10px}.pair-title{font-weight:850}.score-line{margin-top:8px;color:#526b7e;font-size:13px}
    @media(max-width:600px){.image-options{grid-template-columns:1fr}.match-row,.class-row{grid-template-columns:1fr}.match-image{grid-template-columns:90px 1fr}.match-image img{width:90px;height:75px}.page{width:100%;margin:0}.card{border-radius:0;border-left:0;border-right:0}.head,.status{padding-left:14px;padding-right:14px}.player-shell{min-height:200px}.modal-backdrop{padding:8px;align-items:flex-end}.modal{max-height:92vh;border-radius:18px 18px 0 0}.modal-body{padding:15px}}
  </style>
</head>
<body>
  <main class="page">
    <section class="card">
      <header class="head"><h1 id="lessonTitle"></h1><p class="sub" id="lessonDescription"></p></header>
      <div class="player-shell">
        <div id="player"></div>
        <div class="loading" id="loading">Đang tải video…</div>
      </div>
      <div class="status">
        <div class="row"><span class="time" id="timeText">00:00 / 00:00</span></div>
        <div class="track"><div class="fill" id="progressFill"></div></div>
        <p class="message" id="statusMessage">Video sẽ tự dừng tại các điểm tương tác.</p>
        <div class="notice" id="notice"></div>
      </div>
    </section>
  </main>

  <div class="modal-backdrop" id="exerciseBackdrop" aria-modal="true" role="dialog">
    <div class="modal">
      <div class="modal-head"><h2 id="exerciseTitle">Bài tập tương tác</h2></div>
      <div class="modal-body">
        <p class="q" id="questionText"></p>
        <div id="exerciseArea"></div>
        <div class="feedback" id="feedback"></div>
        <div class="modal-actions">
          <button class="btn secondary hidden" id="skipBtn" type="button">Bỏ qua</button>
          <button class="btn primary" id="checkBtn" type="button">Kiểm tra</button>
          <button class="btn primary hidden" id="continueBtn" type="button">Xem tiếp</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    "use strict";
    const LESSON_DATA = {"lessonId":"bai1","title":"Bài học video tương tác 1","description":"Xem video và hoàn thành các bài tập tại điểm dừng.","youtubeId":"8SOJr48K-sg","interactions":[{"id":"q1","time":7.49,"type":"multiple_choice","question":"ffdf","data":{"options":["sdfsf","sdfsf"],"correctAnswers":[0]},"explanation":"","required":true,"wrongAction":"replay_segment","replayStart":0,"replayEnd":7.49,"points":1}]};

    const BLOCK_FORWARD_SEEK_ALWAYS = true;
    const FORCE_PLAYBACK_RATE_1X_ALWAYS = true;
    const GUARD_INTERVAL_MS = 90;
    const FORWARD_JUMP_TOLERANCE = 0.55;
    const RATE_TOLERANCE = 0.01;
    const SAVE_INTERVAL_MS = 4000;

    const USER_ID = String(window.APP_USER_UID || "guest");
    const PROGRESS_KEY = "interactive-video:" + USER_ID + ":" + LESSON_DATA.lessonId;

    /*
     * Theo yêu cầu hiện tại: mỗi lần F5 hoặc mở lại trang là một lượt học mới.
     * Không khôi phục watchedUntil, bài tập đã làm hoặc trạng thái hoàn thành
     * từ localStorage.
     */
    const RESET_PROGRESS_ON_RELOAD = true;

    function createEmptyProgress(){
      return {
        watchedUntil:0,
        completed:false,
        completedInteractions:{},
        attempts:{},
        scores:{}
      };
    }

    const ProgressStore = {
      load(){
        if(RESET_PROGRESS_ON_RELOAD){
          try{
            localStorage.removeItem(PROGRESS_KEY);
          }catch(e){}

          return createEmptyProgress();
        }

        try{
          return JSON.parse(
            localStorage.getItem(PROGRESS_KEY)||"null"
          )||createEmptyProgress();
        }catch(e){
          return createEmptyProgress();
        }
      },

      save(data){
        if(RESET_PROGRESS_ON_RELOAD){
          return;
        }

        localStorage.setItem(
          PROGRESS_KEY,
          JSON.stringify({
            ...data,
            updatedAt:new Date().toISOString()
          })
        );
      }
    };

    let progress=ProgressStore.load();
    progress.completedInteractions=progress.completedInteractions||{};
    progress.attempts=progress.attempts||{};progress.scores=progress.scores||{};

    let player=null,youtubeReady=false,playerReady=false,duration=0;
    let expectedPlaybackTime=0,lastObservedTime=0,lastRealTimestamp=0;
    let isProgrammaticSeek=false,isRestoringRate=false,seekCorrectionToken=0;
    let hasPlaybackStarted=false,startupGraceUntil=0,initialStartAt=0;let userPlaybackStarted=false,lastMediaAdvanceAt=0,lastMediaTime=0;
    let guardTimer=null,saveTimer=null,uiTimer=null,noticeTimer=null,toastTimer=null;
    let activeInteraction=null,interactionOpen=false,replayMode=null,selectedOrder=[];let speechTranscript="",recordedBlob=null,recordDuration=0,mediaRecorder=null,recordChunks=[],recordStartedAt=0;

    const $=id=>document.getElementById(id);
    const loading=$("loading"),timeText=$("timeText"),progressFill=$("progressFill"),statusMessage=$("statusMessage"),notice=$("notice");
    const backdrop=$("exerciseBackdrop"),questionText=$("questionText"),exerciseArea=$("exerciseArea"),feedback=$("feedback"),checkBtn=$("checkBtn"),continueBtn=$("continueBtn"),skipBtn=$("skipBtn");

    $("lessonTitle").textContent=LESSON_DATA.title||LESSON_DATA.lessonId;
    $("lessonDescription").textContent=LESSON_DATA.description||"Hoàn thành các bài tập để tiếp tục video.";
    document.title=LESSON_DATA.title||"Bài học video";

    window.onYouTubeIframeAPIReady=function(){youtubeReady=true;createPlayer()};

    function createPlayer(){
      if(!youtubeReady)return;

      if(location.protocol!=="http:"&&location.protocol!=="https:"){
        loading.textContent="Không thể nạp YouTube khi mở trực tiếp bằng file.";
        showNotice(
          "YouTube yêu cầu HTTP Referer. Hãy đưa bài lên website HTTP/HTTPS hoặc chạy bài qua máy chủ localhost.",
          "error"
        );
        return;
      }

      player=new YT.Player("player",{
        width:"100%",
        height:"100%",
        videoId:LESSON_DATA.youtubeId,
        playerVars:{
          playsinline:1,
          controls:1,
          autoplay:0,
          start:0,
          disablekb:1,
          rel:0,
          fs:1,
          modestbranding:1,
          origin:location.origin
        },
        events:{
          onReady:onPlayerReady,
          onStateChange:onPlayerStateChange,
          onPlaybackRateChange:e=>forceRateTo1X(e.target,true),
          onError:onPlayerError
        }
      })
    }

    function onPlayerReady(e){
      playerReady=true;
      loading.style.display="none";
      userPlaybackStarted=false;
      duration=Number(e.target.getDuration())||0;
      forceRateTo1X(e.target,false);

      /*
       * Luôn bắt đầu một lượt học mới từ đầu khi mở trang hoặc F5.
       */
      const startAt=0;

      initialStartAt=startAt;
      hasPlaybackStarted=false;
      startupGraceUntil=0;
      lastMediaTime=startAt;
      lastMediaAdvanceAt=performance.now();

      /*
       * Không gọi seekTo(0) khi bắt đầu từ đầu.
       * Trên một số video, lệnh seekTo(0) lúc player vừa sẵn sàng làm
       * bộ chống tua liên tục kéo video về 0.
       */
      if(startAt>.05){
        safeSeekTo(startAt,false);
      }else{
        isProgrammaticSeek=false;
        expectedPlaybackTime=0;
        lastObservedTime=0;
        lastRealTimestamp=performance.now();
      }

      clearInterval(guardTimer);
      clearInterval(saveTimer);
      clearInterval(uiTimer);

      guardTimer=setInterval(
        guardPlayback,
        GUARD_INTERVAL_MS
      );

      saveTimer=setInterval(
        saveProgress,
        SAVE_INTERVAL_MS
      );

      /*
       * Thanh tiến trình và đồng hồ dùng timer riêng.
       * Vì vậy giao diện vẫn cập nhật trong lúc:
       * - kiểm tra chống tua;
       * - phát lại đoạn video;
       * - chuyển vị trí hợp lệ;
       * - tạm dừng tại điểm tương tác.
       */
      uiTimer=setInterval(
        updateUI,
        100
      );

      statusMessage.textContent=
        "Video sẽ tự dừng tại điểm tương tác tiếp theo.";

      updateUI();

      setTimeout(()=>{
        const due=getDueInteraction(
          getCurrentTime()+.15
        );

        if(due){
          openInteraction(due);
        }
      },850)
    }

    function onPlayerStateChange(e){
      if(!playerReady){
        return;
      }

      forceRateTo1X(
        e.target,
        false
      );

      if(e.data===YT.PlayerState.PLAYING){
        userPlaybackStarted=true;

        const current=getCurrentTime();

        if(
          current>lastMediaTime+.01
        ){
          lastMediaTime=current;
          lastMediaAdvanceAt=performance.now();
        }
      }

      /*
       * Lần PLAYING đầu tiên cần một khoảng ổn định ngắn.
       * Nếu kiểm tra chống tua ngay ở vài khung hình đầu, YouTube có thể
       * bị kéo về 0 lặp lại dù người học không hề tua.
       */
      if(
        e.data===YT.PlayerState.PLAYING &&
        !hasPlaybackStarted
      ){
        hasPlaybackStarted=true;

        const current=getCurrentTime();
        const maximumNaturalStart=
          initialStartAt+2.25;

        if(current<=maximumNaturalStart){
          expectedPlaybackTime=current;
          lastObservedTime=current;
          lastRealTimestamp=performance.now();
          startupGraceUntil=
            performance.now()+1250;

          if(!progress.completed){
            progress.watchedUntil=Math.max(
              Number(progress.watchedUntil)||0,
              current
            );
          }

          updateUI();
          return;
        }

        snapBackToAllowed(
          initialStartAt,
          true
        );

        return;
      }

      /*
       * Đồng bộ giao diện ngay khi trạng thái YouTube thay đổi.
       */
      updateUI();

      if(e.data!==YT.PlayerState.ENDED){
        guardPlayback();
        setTimeout(guardPlayback,60);
        setTimeout(guardPlayback,180);
        setTimeout(guardPlayback,380);
      }

      if(e.data===YT.PlayerState.PAUSED){
        saveProgress();
      }
      if(e.data===YT.PlayerState.ENDED){
        duration=Number(e.target.getDuration())||duration||0;
        const allDone=allRequiredDone();
        const natural=expectedPlaybackTime>=duration-2.5;
        if(allDone&&natural){progress.completed=true;progress.watchedUntil=duration;ProgressStore.save(progress);showNotice("Đã hoàn thành bài học.","success",4000);updateUI()}
        else{const pending=getNextPendingInteraction();snapBackToAllowed(pending?pending.time:Math.max(0,expectedPlaybackTime),false);showNotice(allDone?"Không thể tua thẳng tới cuối video.":"Bạn cần hoàn thành tất cả bài tập bắt buộc.","warning",3000)}
      }
    }

    function onPlayerError(e){
      const m={
        2:"ID video không hợp lệ.",
        5:"Không phát được video này.",
        100:"Video không tồn tại, đã bị xóa hoặc đặt riêng tư.",
        101:"Chủ video không cho phép nhúng.",
        150:"Chủ video không cho phép nhúng.",
        153:"YouTube không nhận được HTTP Referer. Hãy chạy bài trên website HTTP/HTTPS hoặc localhost."
      };
      showNotice(m[e.data]||("Không tải được video. Mã lỗi: "+e.data),"error")
    }

    function forceRateTo1X(target,show){
      if(!FORCE_PLAYBACK_RATE_1X_ALWAYS||!target||typeof target.getPlaybackRate!=="function")return;
      let r=1;try{r=Number(target.getPlaybackRate())||1}catch(e){return}
      if(Math.abs(r-1)<=RATE_TOLERANCE||isRestoringRate)return;
      isRestoringRate=true;try{target.setPlaybackRate(1)}catch(e){}
      if(show)showNotice("Video chỉ được xem ở tốc độ 1.00x.","warning",2200);
      setTimeout(()=>{isRestoringRate=false},260)
    }

    function guardPlayback(){
      if(
        !playerReady||
        !player||
        interactionOpen
      ){
        return;
      }

      const current=getCurrentTime();
      const now=performance.now();

      let state=-1;
      let rate=1;

      try{
        state=player.getPlayerState();
        rate=Number(
          player.getPlaybackRate()
        )||1;
        duration=Number(
          player.getDuration()
        )||duration||0;
      }catch(e){
        return;
      }

      if(
        Math.abs(rate-1)>
        RATE_TOLERANCE
      ){
        forceRateTo1X(
          player,
          true
        );
      }

      /*
       * Chỉ bắt đầu kiểm tra khi YouTube báo trạng thái PLAYING thật.
       */
      if(!userPlaybackStarted){
        updateUI();
        return;
      }

      if(isProgrammaticSeek){
        updateUI();
        return;
      }

      if(replayMode){
        if(
          current>=
          replayMode.end-.08
        ){
          const item=replayMode.item;
          replayMode=null;
          openInteraction(item);
          return;
        }

        lastObservedTime=current;
        lastMediaTime=current;
        lastRealTimestamp=now;
        lastMediaAdvanceAt=now;
        updateUI();
        return;
      }

      const wallDelta=Math.max(
        .001,
        Math.min(
          8,
          (now-lastRealTimestamp)/1000
        )
      );

      const mediaDelta=
        current-lastObservedTime;

      /*
       * Tua lùi luôn được phép.
       */
      if(mediaDelta<-.35){
        expectedPlaybackTime=current;
        lastObservedTime=current;
        lastMediaTime=current;
        lastRealTimestamp=now;
        lastMediaAdvanceAt=now;
        updateUI();
        return;
      }

      /*
       * Không phụ thuộc hoàn toàn vào getPlayerState().
       * Một số trình duyệt cập nhật trạng thái chậm dù currentTime đang
       * tăng tự nhiên. Chấp nhận các bước tăng nhỏ phù hợp thời gian thực.
       */
      const naturalForwardAllowance=
        Math.max(
          1.15,
          wallDelta*2.15+.42
        );

      const forwardJump=
        mediaDelta>
        naturalForwardAllowance;

      if(
        BLOCK_FORWARD_SEEK_ALWAYS&&
        forwardJump
      ){
        snapBackToAllowed(
          Math.max(
            0,
            lastObservedTime+
            Math.min(
              wallDelta,
              .35
            )
          ),
          state===YT.PlayerState.PLAYING
        );

        showNotice(
          "Không cho phép tua tới trước.",
          "warning",
          2100
        );

        return;
      }

      /*
       * Dòng thời gian đã tăng tự nhiên, dù YouTube có thể chưa báo đúng
       * trạng thái PLAYING.
       */
      if(current>lastMediaTime+.01){
        lastMediaTime=current;
        lastMediaAdvanceAt=now;
      }

      const due=getDueInteraction(
        current
      );

      if(due){
        openInteraction(due);
        return;
      }

      expectedPlaybackTime=current;
      lastObservedTime=current;
      lastRealTimestamp=now;

      if(!progress.completed){
        progress.watchedUntil=Math.max(
          Number(
            progress.watchedUntil
          )||0,
          current
        );
      }

      updateUI();

    function markInteractionComplete(item,earned){progress.completedInteractions[item.id]=true;progress.watchedUntil=Math.max(Number(progress.watchedUntil)||0,Number(item.time)||0);progress.scores[item.id]=earned?Math.max(0,Number(item.points)||0):0;ProgressStore.save(progress)}
    function normalizeAnswer(value,d){let s=String(value||"").trim();if(!d.caseSensitive)s=s.toLowerCase();s=s.replace(/\s+/g," ");if(d.ignorePunctuation!==false)s=s.replace(/[.,!?;:'"“”‘’]+/g,"");return s}
    function textAnswerIsCorrect(value,d){const got=normalizeAnswer(value,d);return (d.acceptedAnswers||[]).some(x=>normalizeAnswer(x,d)===got)}
    function similarity(a,b){a=normalizeAnswer(a,{ignorePunctuation:true}),b=normalizeAnswer(b,{ignorePunctuation:true});if(!a&&!b)return 1;const aa=a.split(" "),bb=b.split(" ");let same=0;aa.forEach(w=>{const i=bb.indexOf(w);if(i>=0){same++;bb.splice(i,1)}});return same/Math.max(aa.length,b.split(" ").length,1)}

    function checkAnswer(item){
      const d=getItemData(item);
      if(item.type==="multiple_choice"||item.type==="image_choice"){const c=exerciseArea.querySelector('input[name="answer"]:checked');return !!c&&Number(c.value)===Number((d.correctAnswers||[])[0])}
      if(item.type==="multiple_select"){const got=[...exerciseArea.querySelectorAll('input[name="answer"]:checked')].map(x=>Number(x.value)).sort((a,b)=>a-b),expected=(d.correctAnswers||[]).map(Number).sort((a,b)=>a-b);return JSON.stringify(got)===JSON.stringify(expected)}
      if(item.type==="true_false"){const c=exerciseArea.querySelector('input[name="answer"]:checked');return !!c&&String(c.value)===String(d.correctBoolean)}
      if(item.type==="dropdown")return Number($("dropdownAnswer")?.value)===Number((d.correctAnswers||[])[0]);
      if(["fill_blank","dictation_word","dictation_sentence","short_answer","rewrite_sentence"].includes(item.type))return textAnswerIsCorrect($("textAnswer")?.value||"",d);
      if(item.type==="multi_blank")return (d.blanks||[]).every(b=>{const input=exerciseArea.querySelector(`[data-blank-key="${CSS.escape(String(b.key))}"]`);return textAnswerIsCorrect(input?.value||"",{...d,acceptedAnswers:b.acceptedAnswers||[]})});
      if(["reorder_words","reorder_sentences","reorder_dialogue"].includes(item.type))return selectedOrder.length===(d.correctItems||[]).length&&selectedOrder.every((x,i)=>normalizeAnswer(x.word,{ignorePunctuation:false})===normalizeAnswer((d.correctItems||[])[i],{ignorePunctuation:false}));
      if(item.type==="matching_pairs")return (d.pairs||[]).every((p,i)=>exerciseArea.querySelector(`[data-match-index="${i}"]`)?.value===p.right);
      if(item.type==="matching_image")return (d.pairs||[]).every((p,i)=>exerciseArea.querySelector(`[data-image-match="${i}"]`)?.value===p.left);
      if(item.type==="classification")return (d.items||[]).every((p,i)=>exerciseArea.querySelector(`[data-class-index="${i}"]`)?.value===p.category);
      if(item.type==="pronunciation"){const spoken=speechTranscript||$("speechFallback")?.value||"";const targets=[d.targetText,...(d.acceptedAnswers||[])].filter(Boolean);return targets.some(t=>similarity(spoken,t)>=(Number(d.threshold)||75)/100)}
      if(item.type==="recording")return !!recordedBlob&&recordDuration>=Math.max(1,Number(d.minSeconds)||3);
      if(isContentType(item.type))return true;return false
    }

    function answerSummary(item){const d=getItemData(item);let answer="";if(["multiple_choice","dropdown","image_choice"].includes(item.type)){const i=(d.correctAnswers||[])[0],o=(d.options||[])[i];answer=typeof o==="object"?o.text:o}else if(item.type==="multiple_select")answer=(d.correctAnswers||[]).map(i=>{const o=(d.options||[])[i];return typeof o==="object"?o.text:o}).join(", ");else if(item.type==="true_false")answer=String(d.correctBoolean)==="true"?"Đúng":"Sai";else if(["fill_blank","dictation_word","dictation_sentence","short_answer","rewrite_sentence"].includes(item.type))answer=(d.acceptedAnswers||[]).join(" / ");else if(item.type==="multi_blank")answer=(d.blanks||[]).map(b=>b.key+": "+(b.acceptedAnswers||[]).join(" / ")).join("; ");else if(["reorder_words","reorder_sentences","reorder_dialogue"].includes(item.type))answer=(d.correctItems||[]).join(item.type==="reorder_words"?" ":" → ");else if(item.type==="matching_pairs")answer=(d.pairs||[]).map(p=>p.left+" = "+p.right).join("; ");else if(item.type==="classification")answer=(d.items||[]).map(p=>p.text+" → "+p.category).join("; ");else if(item.type==="pronunciation")answer=d.targetText||"";else if(item.type==="recording")answer="Ghi âm đủ thời lượng yêu cầu.";return answer?"<strong>Đáp án:</strong> "+escapeHtml(answer):""}

    function startReplay(item){
      seekCorrectionToken++;
      const start=Number(item.replayStart);const end=Number(item.replayEnd);
      if(!Number.isFinite(start)||!Number.isFinite(end)||end<=start){return}
      backdrop.classList.remove("show");
      interactionOpen=false;
      activeInteraction=null;
      replayMode={start,end,item};
      userPlaybackStarted=true;
      safeSeekTo(start,false);

      setTimeout(()=>{
        try{
          player.playVideo();
        }catch(e){}
      },700)
    }

    function closeInteraction(resume){
      seekCorrectionToken++;
      backdrop.classList.remove("show");
      interactionOpen=false;
      activeInteraction=null;
      feedback.className="feedback";

      const t=getCurrentTime();

      expectedPlaybackTime=t;
      lastObservedTime=t;
      lastRealTimestamp=performance.now();

      if(resume){
        setTimeout(()=>{
          forceRateTo1X(player,false);
          expectedPlaybackTime=getCurrentTime();
          lastObservedTime=expectedPlaybackTime;
          lastRealTimestamp=performance.now();

          userPlaybackStarted=true;

          try{
            player.playVideo();
          }catch(e){}
        },150);
      }

      updateUI();
    }

    function snapBackToAllowed(seconds,resume){
      if(!playerReady||!player)return;const target=Math.max(0,duration>0?Math.min(Number(seconds)||0,duration):Number(seconds)||0);const token=++seekCorrectionToken;const attempts=[0,70,170,340,650];expectedPlaybackTime=target;lastObservedTime=target;lastRealTimestamp=performance.now();
      attempts.forEach((delay,index)=>setTimeout(()=>{if(token!==seekCorrectionToken||!playerReady)return;const cur=getCurrentTime();if(index===0||cur>target+.32||cur<Math.max(0,target-1.25)){try{player.seekTo(target,true)}catch(e){}}forceRateTo1X(player,false);if(index===attempts.length-1){expectedPlaybackTime=target;lastObservedTime=target;lastRealTimestamp=performance.now();try{resume?player.playVideo():player.pauseVideo()}catch(e){}}},delay))
    }

    function safeSeekTo(seconds,allowAhead){
      if(!playerReady||!player)return;const target=Math.max(0,duration>0?Math.min(Number(seconds)||0,duration):Number(seconds)||0);isProgrammaticSeek=true;try{player.seekTo(target,allowAhead===true)}catch(e){};expectedPlaybackTime=target;lastObservedTime=target;lastRealTimestamp=performance.now();setTimeout(()=>{const actual=getCurrentTime();if(actual>target+.6){try{player.seekTo(target,true)}catch(e){};expectedPlaybackTime=target;lastObservedTime=target}else{expectedPlaybackTime=actual;lastObservedTime=actual}lastRealTimestamp=performance.now();isProgrammaticSeek=false;forceRateTo1X(player,false)},620)
    }

    function saveProgress(){if(!playerReady)return;ProgressStore.save(progress)}
    window.addEventListener("beforeunload",()=>{
      clearInterval(guardTimer);
      clearInterval(saveTimer);
      clearInterval(uiTimer);
      saveProgress();
    });
    document.addEventListener("visibilitychange",()=>{if(!document.hidden&&playerReady){const c=getCurrentTime();expectedPlaybackTime=c;lastObservedTime=c;lastRealTimestamp=performance.now();forceRateTo1X(player,false)}});
    document.addEventListener("keydown",e=>{if(!playerReady)return;const keys=["ArrowRight","ArrowLeft","Home","End","PageUp","PageDown","j","J","l","L",">","<"];if(keys.includes(e.key)||(e.key>="0"&&e.key<="9")){e.preventDefault();e.stopPropagation();showNotice("Các phím tua đã bị khóa.","warning",1500)}},true);

    function updateUI(){
      if(!playerReady){
        return;
      }

      const cur=getCurrentTime();
      const total=Math.max(
        0,
        Number(duration)||0
      );

      if(!userPlaybackStarted){
        progressFill.style.width="0%";
        timeText.textContent=
          "00:00 / "+formatTime(total);
        return;
      }

      /*
       * Thanh nhìn thấy luôn bám theo thời gian phát hiện tại.
       * watchedUntil vẫn được lưu riêng để chống tua và khôi phục tiến độ,
       * nhưng không dùng làm vị trí của thanh phát.
       */
      const pct=total
        ?Math.min(
            100,
            Math.max(0,cur/total*100)
          )
        :0;

      progressFill.style.width=
        pct.toFixed(3)+"%";

      timeText.textContent=
        formatTime(cur)+" / "+formatTime(total);

      if(progress.completed){
        statusMessage.textContent=
          "Bài đã hoàn thành. Chống tua và tốc độ 1x vẫn được giữ nguyên.";
      }else{
        const earned=Object
          .values(progress.scores||{})
          .reduce(
            (a,b)=>a+(Number(b)||0),
            0
          );

        const totalPoints=(
          LESSON_DATA.interactions||[]
        ).reduce(
          (a,x)=>a+(Number(x.points)||0),
          0
        );

        statusMessage.textContent=
          "Video sẽ tự dừng tại điểm tương tác tiếp theo. Điểm: "+
          earned+"/"+totalPoints;
      }
    }
    function showNotice(msg,type,ms){notice.textContent=msg;notice.className="notice show "+(type||"warning");clearTimeout(noticeTimer);if(ms)noticeTimer=setTimeout(()=>{notice.className="notice"},ms)}
    function showToast(msg){$("toast").textContent=msg;$("toast").classList.add("show");clearTimeout(toastTimer);toastTimer=setTimeout(()=>$("toast").classList.remove("show"),2500)}
    function getCurrentTime(){if(!playerReady||!player)return 0;try{return Math.max(0,Number(player.getCurrentTime())||0)}catch(e){return 0}}
    function formatTime(s){s=Math.max(0,Math.floor(Number(s)||0));const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),x=s%60;return (h?String(h).padStart(2,"0")+":":"")+String(m).padStart(2,"0")+":"+String(x).padStart(2,"0")}
    function normalizeSentence(s){return String(s||"").trim().toLowerCase().replace(/\s+/g," ").replace(/[.,!?;:]+$/g,"")}
    function escapeHtml(s){return String(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
  </script>
